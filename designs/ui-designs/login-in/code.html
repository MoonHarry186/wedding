<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng nhập - Aura Invitations</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                        "secondary-fixed-dim": "#b9c7df",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#787680",
                        "inverse-primary": "#c4c1fb",
                        "on-secondary-container": "#57657a",
                        "on-error-container": "#93000a",
                        "surface": "#f7f9fb",
                        "background": "#f7f9fb",
                        "secondary": "#515f74",
                        "on-primary": "#ffffff",
                        "surface-variant": "#e0e3e5",
                        "primary-fixed-dim": "#c4c1fb",
                        "inverse-on-surface": "#eff1f3",
                        "on-secondary-fixed-variant": "#3a485b",
                        "secondary-container": "#d5e3fc",
                        "surface-dim": "#d8dadc",
                        "surface-bright": "#f7f9fb",

                        "surface-container-high": "#e6e8ea",
                        "on-tertiary-container": "#7c8a9f",

                        "primary-fixed": "#e3dfff",

                        "on-primary-fixed": "#181445",
                        "surface-container": "#eceef0",
                        "on-background": "#191c1e",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#0d1c2d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xl": "4rem",
                        "margin": "2rem",
                        "unit": "4px",
                        "gutter": "1.5rem",
                        "lg": "2.5rem",
                        "xs": "0.5rem",
                        "md": "1.5rem",
                        "sm": "1rem"
                    },
                    "fontFamily": {
                        "button": ["Inter"],
                        "h1": ["Noto Serif"],
                        "body-lg": ["Inter"],
                        "display": ["Noto Serif"],
                        "h2": ["Noto Serif"],

                        "h3": ["Noto Serif"],
                        "body-md": ["Inter"],
                        "body-sm": ["Inter"]
                    },
                    "fontSize": {

                        "display": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "h2": ["28px", { "lineHeight": "1.3", "fontWeight": "500" }],
                        "label-caps": ["12px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "h3": ["22px", { "lineHeight": "1.4", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }]

                }
            }
        }

<body class="bg-background text-on-background min-h-screen flex antialiased">
<!-- Left Content / Image Area -->
<div class="hidden lg:flex lg:w-1/2 relative bg-surface-variant overflow-hidden">
<img alt="Luxury stationery" class="absolute inset-0 w-full h-full object-cover" data-alt="A beautifully styled, high-end wedding invitation suite laid out on a clean, light surface. The scene features premium cardstock with letterpress typography, delicate wax seals, and soft floral accents. The lighting is bright and natural, creating a soft, romantic, and sophisticated mood consistent with a modern corporate yet elegant aesthetic. The color palette includes soft creams, slate grays, and muted organic tones." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD0JS--pnbSm1bzbDgY-zLDtAsixPHDLOkKXXN21asSd8xPt9lOfhAYptMyOW1iOhiaMsGzp0DxcPkw63ZpBWpY6b9IpT7zC5VDJ0HrsZlJx_qNwzIXDUmJibv8Wsy6350f0fqzE8hysViq8PlNYu9NErnza8KjMHpsYU8PoJ2y5inTxzcvJw0ArkVL9sxcHZaqqBR-co6h0NoqQq_lY5BGCXwnaIXLFBrE0D-IfYiZMZiQGxgJvwPqCOAje9HGOvTeRN0ieTKFgKjK"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent"></div>
<div class="absolute bottom-xl left-xl right-xl text-white">
<h2 class="font-h2 text-h2 text-on-primary mb-sm">Elevating Your Celebrations</h2>
<p class="font-body-lg text-body-lg text-on-primary/90 max-w-md">Experience the perfect blend of digital convenience and premium stationery aesthetics with Aura Invitations.</p>
</div>
</div>
<!-- Right Content / Login Form -->
<div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12 md:p-24 relative bg-surface-container-lowest">
<!-- Subtle Background Accent -->
<div class="absolute top-0 right-0 w-64 h-64 bg-primary-fixed/20 rounded-full blur-3xl -mr-32 -mt-32 pointer-events-none"></div>
<div class="w-full max-w-md relative z-10">
<!-- Brand / Logo -->
<div class="mb-xl text-center lg:text-left">
<h1 class="font-display text-display text-primary-container mb-xs">Aura Invitations</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to manage your events and designs.</p>
</div>
<!-- Login Form -->
<form class="space-y-lg">
<!-- Email Input -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface mb-unit uppercase" for="email">Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-outline">
<span class="material-symbols-outlined" data-icon="mail">mail</span>
</span>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant bg-surface-container-lowest text-on-surface rounded font-body-md text-body-md focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors placeholder:text-outline" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex items-center justify-between mb-unit">
<label class="block font-label-caps text-label-caps text-on-surface uppercase" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:text-primary-container transition-colors font-medium" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-outline">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
</span>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant bg-surface-container-lowest text-on-surface rounded font-body-md text-body-md focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary-container focus:ring-primary-container bg-surface-container-lowest" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant" for="remember-me">
                        Remember me for 30 days
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center py-4 px-4 border border-transparent rounded bg-primary-container text-on-primary font-button text-button hover:bg-primary transition-colors shadow-sm" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="mt-lg relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center">
<span class="px-2 bg-surface-container-lowest font-body-sm text-body-sm text-outline">or continue with</span>
</div>
</div>
<!-- Social Logins (Example) -->
<div class="mt-lg grid grid-cols-2 gap-sm">
<button class="w-full inline-flex justify-center py-3 px-4 border border-outline-variant rounded bg-surface-container-lowest font-body-sm text-body-sm text-on-surface hover:bg-surface-container-low transition-colors shadow-sm" type="button">
<span class="sr-only">Sign in with Google</span>
                    Google
                </button>
<button class="w-full inline-flex justify-center py-3 px-4 border border-outline-variant rounded bg-surface-container-lowest font-body-sm text-body-sm text-on-surface hover:bg-surface-container-low transition-colors shadow-sm" type="button">
<span class="sr-only">Sign in with Microsoft</span>
                    Microsoft
                </button>
</div>
<!-- Register Link -->
<p class="mt-xl text-center font-body-md text-body-md text-on-surface-variant">
                Don't have an account? 
                <a class="font-medium text-primary hover:text-primary-container transition-colors" href="#">Sign up now</a>
</p>
</div>
</div>
</body></html>
