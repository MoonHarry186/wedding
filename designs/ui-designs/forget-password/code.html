<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Khôi phục mật khẩu - Aura Invitations</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Noto+Serif:wght@500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#444173",
                        "on-error": "#ffffff",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#d4e4fa",
                        "secondary-fixed": "#d5e3fc",
                        "on-tertiary-fixed-variant": "#39485a",
                        "on-surface-variant": "#47464f",
                        "primary": "#070235",
                        "primary-container": "#1e1b4b",
                        "inverse-surface": "#2d3133",
                        "tertiary-fixed-dim": "#b9c8de",
                        "secondary-fixed-dim": "#b9c7df",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#787680",
                        "inverse-primary": "#c4c1fb",
                        "on-secondary-container": "#57657a",
                        "on-error-container": "#93000a",
                        "surface": "#f7f9fb",
                        "background": "#f7f9fb",
                        "secondary": "#515f74",
                        "on-primary": "#ffffff",
                        "surface-variant": "#e0e3e5",
                        "primary-fixed-dim": "#c4c1fb",
                        "inverse-on-surface": "#eff1f3",
                        "on-secondary-fixed-variant": "#3a485b",
                        "secondary-container": "#d5e3fc",
                        "surface-dim": "#d8dadc",
                        "surface-bright": "#f7f9fb",
                        "error": "#ba1a1a",
                        "surface-container-high": "#e6e8ea",
                        "on-tertiary-container": "#7c8a9f",
                        "surface-container-highest": "#e0e3e5",
                        "outline-variant": "#c8c5d0",
                        "surface-tint": "#5b598c",
                        "tertiary-container": "#142333",
                        "surface-container-low": "#f2f4f6",
                        "tertiary": "#000c1c",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed": "#0d1c2e",
                        "on-surface": "#191c1e",
                        "primary-fixed": "#e3dfff",
                        "on-primary-container": "#8683ba",
                        "on-primary-fixed": "#181445",
                        "surface-container": "#eceef0",
                        "on-background": "#191c1e",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#0d1c2d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xl": "4rem",
                        "margin": "2rem",
                        "unit": "4px",
                        "gutter": "1.5rem",
                        "lg": "2.5rem",
                        "xs": "0.5rem",
                        "md": "1.5rem",
                        "sm": "1rem"
                    },
                    "fontFamily": {
                        "button": ["Inter"],
                        "h1": ["Noto Serif"],
                        "body-lg": ["Inter"],
                        "display": ["Noto Serif"],
                        "h2": ["Noto Serif"],
                        "label-caps": ["Inter"],
                        "h3": ["Noto Serif"],
                        "body-md": ["Inter"],
                        "body-sm": ["Inter"]
                    },
                    "fontSize": {
                        "button": ["15px", { "lineHeight": "1", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "h1": ["36px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "display": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "h2": ["28px", { "lineHeight": "1.3", "fontWeight": "500" }],
                        "label-caps": ["12px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "h3": ["22px", { "lineHeight": "1.4", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center font-sans antialiased text-on-background">
<!-- Main Container for centered content -->
<main class="w-full max-w-md px-6 py-12">
<!-- Brand / Logo Area -->
<div class="text-center mb-xl">
<span class="font-display text-display text-primary tracking-tight">Aura Invitations</span>
</div>
<!-- Card Container -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_2px_4px_rgba(30,27,75,0.04)] border border-surface-container-highest p-lg">
<!-- Header -->
<div class="mb-lg text-center">
<h1 class="font-h2 text-h2 text-on-surface mb-xs">Khôi phục mật khẩu</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Vui lòng nhập địa chỉ email của bạn. Chúng tôi sẽ gửi cho bạn một liên kết để tạo mật khẩu mới.
                </p>
</div>
<!-- Form -->
<form action="#" class="space-y-md" method="POST">
<!-- Email Field -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface mb-xs" for="email">EMAIL</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-DEFAULT bg-surface-container-lowest text-on-surface focus:ring-1 focus:ring-primary focus:border-primary font-body-md text-body-md transition-colors" id="email" name="email" placeholder="nhapemail@vd.com" required="" type="email"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-DEFAULT shadow-sm bg-primary text-on-primary font-button text-button hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors" type="submit">
                    Gửi liên kết
                </button>
</form>
<!-- Footer Action -->
<div class="mt-lg text-center">
<a class="inline-flex items-center font-button text-button text-primary hover:text-primary-container transition-colors" href="#">
<span class="material-symbols-outlined mr-unit text-[18px]">arrow_back</span>
                    Quay lại Đăng nhập
                </a>
</div>
</div>
</main>
</body></html>
