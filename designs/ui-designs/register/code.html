<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased">
<!-- Transactional Page - No Top Navigation Required per Logic -->
<main class="flex-grow flex items-stretch">
<div class="w-full flex">
<!-- Left Side: Image / Brand Visual -->
<div class="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-surface-container-lowest border-r border-surface-variant">
<div class="absolute inset-0 bg-cover bg-center" data-alt="A highly detailed close-up of a premium, letterpress wedding invitation suite lying on a soft, textured linen surface. The composition is elegant and minimalist, featuring soft, diffused natural lighting that highlights the deep impression of the text and subtle blind embossing. A sprig of dried eucalyptus is gently placed across the stationery, adding a touch of organic warmth. The overall mood is sophisticated, romantic, and highly professional, utilizing a color palette of crisp whites, soft grays, and subtle botanical greens, perfectly aligning with a modern, high-end event planning aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCk-1ZovLQEgtSphRCRoam1VZ7_Kz-_khNl51PVJO5weYrAIVqJY71NIPFn7KBR2zJ5EXgze3FmaiwSsh3-u9ES9TuLRCf-J-ItH4-SZ8wVW6ys-vnBvPAQzIbN8EIAbhOAjdAiOwTxf-w8CsJBIKM2PIp_-OlYSbVkaIR3l--RSTydeTbJb-sfwV24Guly-uyTMTKj54ED-5MoXdZ64B896llU2hyYTiASmfoPhK0O4T1jzZQZLvOXTE4SXmZbeehutyQfTrsOZc8z');"></div>
<div class="absolute inset-0 bg-primary/10"></div> <!-- Subtle overlay for text readability if needed -->
<div class="absolute inset-0 flex flex-col justify-end p-xl z-10">
<h1 class="font-display text-display text-surface-container-lowest mb-md drop-shadow-lg">Crafting Memorable Impressions.</h1>
<p class="font-body-lg text-body-lg text-surface-container-lowest/90 drop-shadow-md max-w-md">Join Aura Invitations to design, manage, and deliver premium digital experiences for your clients.</p>
</div>
</div>
<!-- Right Side: Registration Form -->
<div class="w-full lg:w-1/2 flex items-center justify-center p-sm md:p-xl bg-background">
<div class="w-full max-w-md space-y-lg">
<!-- Header -->
<div class="text-center md:text-left space-y-xs">
<!-- Brand Logo for Mobile -->
<div class="font-h2 text-h2 text-primary font-semibold mb-sm lg:hidden">
                            Aura Invitations
                        </div>
<h2 class="font-h1 text-h1 text-on-background">Create an account</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Start your journey as an event professional.</p>
</div>
<!-- Form -->
<form class="space-y-md">
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="space-y-xs">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="firstName">First Name</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface text-body-md rounded-DEFAULT focus:ring-1 focus:ring-primary focus:border-primary px-sm py-[10px] transition-colors" id="firstName" name="firstName" placeholder="Jane" required="" type="text"/>
</div>
<div class="space-y-xs">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="lastName">Last Name</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface text-body-md rounded-DEFAULT focus:ring-1 focus:ring-primary focus:border-primary px-sm py-[10px] transition-colors" id="lastName" name="lastName" placeholder="Doe" required="" type="text"/>
</div>
</div>
<div class="space-y-xs">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="businessName">Business / Studio Name</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface text-body-md rounded-DEFAULT focus:ring-1 focus:ring-primary focus:border-primary px-sm py-[10px] transition-colors" id="businessName" name="businessName" placeholder="Jane Doe Designs" required="" type="text"/>
</div>
<div class="space-y-xs">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Email Address</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface text-body-md rounded-DEFAULT focus:ring-1 focus:ring-primary focus:border-primary px-sm py-[10px] transition-colors" id="email" name="email" placeholder="jane@example.com" required="" type="email"/>
</div>
<div class="space-y-xs">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface text-body-md rounded-DEFAULT focus:ring-1 focus:ring-primary focus:border-primary px-sm py-[10px] transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-sm top-1/2 transform -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<p class="font-body-sm text-[12px] text-on-surface-variant mt-1">Must be at least 8 characters.</p>
</div>
<div class="flex items-start mt-md">
<div class="flex items-center h-5">
<input class="h-4 w-4 rounded-sm border-outline-variant text-primary focus:ring-primary bg-surface-container-lowest" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="ml-sm">
<label class="font-body-sm text-body-sm text-on-surface-variant" for="terms">
                                    I agree to the <a class="text-primary hover:text-primary-container font-medium hover:underline transition-colors" href="#">Terms of Service</a> and <a class="text-primary hover:text-primary-container font-medium hover:underline transition-colors" href="#">Privacy Policy</a>.
                                </label>
</div>
</div>
<button class="w-full bg-primary text-on-primary font-button text-button py-[12px] px-md rounded-DEFAULT hover:bg-primary-container transition-colors mt-lg shadow-sm flex items-center justify-center gap-xs" type="submit">
                            Create Account
                            <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="text-center pt-md border-t border-surface-variant mt-lg">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                            Already have an account? 
                            <a class="text-primary font-medium hover:text-primary-container hover:underline transition-colors ml-1" href="#">Sign in here</a>
</p>
</div>
</div>
</div>
</div>
</main>
</body></html>
